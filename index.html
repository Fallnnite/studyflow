<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow | Neural Focus Terminal</title>
    
    <!-- Scripts for Browser-side React & Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, updateProfile, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc, getDocs, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCkZiwteYCvWjq9PJ6CCyBJC2lXyCfFYqk",
            authDomain: "studyflow-a9bb7.firebaseapp.com",
            projectId: "studyflow-a9bb7",
            storageBucket: "studyflow-a9bb7.firebasestorage.app",
            messagingSenderId: "507408677066",
            appId: "1:507408677066:web:b5ef1dbd02b1d3c6b45c33"
        };

        const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

        let app, auth, db;
        if (isConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        window.FirebaseAPI = { 
            isConfigured, 
            auth, db, 
            signInAnonymously, onAuthStateChanged, signOut, updateProfile, signInWithCustomToken,
            doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc, getDocs, serverTimestamp 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.15); border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.3); }

        .animate-in { animation: fadeIn 0.7s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "", size = "1em", style = {} }) => (
            <i className={`fas fa-${name} ${className}`} style={{ fontSize: size, ...style }}></i>
        );

        const getCycleId = () => {
            const now = new Date();
            const hour = now.getHours();
            const cycleDate = new Date(now);
            if (hour < 4) cycleDate.setDate(now.getDate() - 1);
            return cycleDate.toISOString().split('T')[0];
        };

        const App = () => {
            const F = window.FirebaseAPI;
            const appId = "study-flow-v5";

            const [authUser, setAuthUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [isLoggingOut, setIsLoggingOut] = useState(false);
            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('sf_profile_v5');
                return saved ? JSON.parse(saved) : { nickname: '', id: '', isCreated: false };
            });

            const [authMode, setAuthMode] = useState('login'); 
            const [loginUsername, setLoginUsername] = useState("");
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [loginError, setLoginError] = useState("");

            const [tasks, setTasks] = useState([]);
            const [activeTaskId, setActiveTaskId] = useState(null);
            const [newTask, setNewTask] = useState("");
            const [mode, setMode] = useState('planning'); 
            
            // Goal State
            const [initialGoalMinutes, setInitialGoalMinutes] = useState(0);
            const [dailyGoalMinutes, setDailyGoalMinutes] = useState(0); 
            const [isGoalSet, setIsGoalSet] = useState(false);
            const [isConfirmedForSession, setIsConfirmedForSession] = useState(false);

            // Calibration Local State
            const [calibHrs, setCalibHrs] = useState(2);
            const [calibMins, setCalibMins] = useState(0);
            
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [sessionSeconds, setSessionSeconds] = useState(0);
            const [totalSecondsSpent, setTotalSecondsSpent] = useState(0);
            const [breakSeconds, setBreakSeconds] = useState(0);
            const [breakCount, setBreakCount] = useState(0);
            const [networkPresence, setNetworkPresence] = useState([]);
            
            const [extensionMinutes, setExtensionMinutes] = useState(30);
            const [showCompletionProtocol, setShowCompletionProtocol] = useState(false);

            const timerRef = useRef(null);
            const activeTaskIdRef = useRef(null);

            useEffect(() => {
                activeTaskIdRef.current = activeTaskId;
            }, [activeTaskId]);

            useEffect(() => {
                if (!F || !F.isConfigured) {
                    setAuthLoading(false);
                    return;
                }
                const unsubscribe = F.onAuthStateChanged(F.auth, (user) => {
                    setAuthUser(user);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, [F]);

            useEffect(() => {
                if (!profile.isCreated || isLoggingOut || !F || !F.isConfigured) return;

                const currentCycle = getCycleId();
                const tasksRef = F.collection(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'tasks');
                const unsubTasks = F.onSnapshot(tasksRef, (snapshot) => {
                    const taskList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setTasks(taskList.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });

                const statsRef = F.doc(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'stats', 'daily');
                const unsubStats = F.onSnapshot(statsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.cycleId !== currentCycle) {
                            setIsGoalSet(false);
                            setTotalSecondsSpent(0);
                            setBreakCount(0);
                            setInitialGoalMinutes(0);
                            setDailyGoalMinutes(0);
                        } else {
                            setTotalSecondsSpent(data.totalSecondsSpent || 0);
                            setDailyGoalMinutes(data.dailyGoalMinutes || 0);
                            setInitialGoalMinutes(data.initialGoalMinutes || data.dailyGoalMinutes || 0);
                            setBreakCount(data.breakCount || 0);
                            setIsGoalSet(!!data.dailyGoalMinutes);
                        }
                    } else {
                        setIsGoalSet(false);
                    }
                });

                const presenceRef = F.collection(F.db, 'artifacts', appId, 'public', 'data', 'presence');
                const unsubPresence = F.onSnapshot(presenceRef, (snapshot) => {
                    const others = snapshot.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .filter(p => p.name !== profile.nickname);
                    setNetworkPresence(others);
                });

                return () => { unsubTasks(); unsubStats(); unsubPresence(); };
            }, [profile.isCreated, isLoggingOut, F]);

            useEffect(() => {
                if (!authUser || !profile.isCreated || isLoggingOut || !F) return;
                const updatePresence = async () => {
                    try {
                        const myPresenceRef = F.doc(F.db, 'artifacts', appId, 'public', 'data', 'presence', authUser.uid);
                        await F.setDoc(myPresenceRef, {
                            name: profile.nickname,
                            status: mode === 'focus' ? 'Focusing' : mode === 'break' ? 'Resting' : 'Planning',
                            lastSeen: F.serverTimestamp()
                        }, { merge: true });
                    } catch (e) {}
                };
                updatePresence();
                const interval = setInterval(updatePresence, 30000); 
                return () => clearInterval(interval);
            }, [authUser, profile.isCreated, mode, isLoggingOut]);

            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                const val = loginUsername.trim();
                if (!val || !F || !F.isConfigured) return;
                setIsLoggingIn(true);
                setLoginError("");

                try {
                    let currentFirebaseUser = F.auth.currentUser;
                    if (!currentFirebaseUser) {
                        const result = await F.signInAnonymously(F.auth);
                        currentFirebaseUser = result.user;
                    }

                    const profileDocRef = F.doc(F.db, 'artifacts', appId, 'public', 'data', 'profiles', val.toLowerCase());
                    const profileSnap = await F.getDoc(profileDocRef);

                    if (authMode === 'signup') {
                        if (profileSnap.exists()) {
                            setLoginError("This name is already registered.");
                            setIsLoggingIn(false); return;
                        }
                        await F.setDoc(profileDocRef, { nickname: val, createdAt: F.serverTimestamp() });
                    } else if (!profileSnap.exists()) {
                        setLoginError("Account not found.");
                        setIsLoggingIn(false); return;
                    }

                    await F.updateProfile(currentFirebaseUser, { displayName: val });
                    const newProfile = { nickname: val, id: currentFirebaseUser.uid, isCreated: true };
                    localStorage.setItem('sf_profile_v5', JSON.stringify(newProfile));
                    setProfile(newProfile);
                } catch (err) { 
                    setLoginError("Connection failed."); 
                } finally { 
                    setIsLoggingIn(false); 
                }
            };

            const handleSignOut = async () => {
                if (!F) return;
                stopTimer();
                setIsLoggingOut(true); 
                try {
                    if (authUser) {
                        const myPresenceRef = F.doc(F.db, 'artifacts', appId, 'public', 'data', 'presence', authUser.uid);
                        await F.deleteDoc(myPresenceRef).catch(() => {});
                    }
                    await F.signOut(F.auth);
                    localStorage.removeItem('sf_profile_v5');
                    setProfile({ nickname: '', id: '', isCreated: false });
                    setAuthUser(null);
                    window.location.reload();
                } catch (err) { setIsLoggingOut(false); }
            };

            const updateStats = async (seconds, breaks, goal = dailyGoalMinutes, init = initialGoalMinutes) => {
                if (!profile.isCreated || !F) return;
                const statsRef = F.doc(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'stats', 'daily');
                await F.setDoc(statsRef, {
                    totalSecondsSpent: seconds,
                    breakCount: breaks,
                    dailyGoalMinutes: goal,
                    initialGoalMinutes: init,
                    cycleId: getCycleId(),
                    updatedAt: F.serverTimestamp()
                }, { merge: true });
            };

            const setDailyInitialGoal = () => {
                const totalMins = (parseInt(calibHrs) * 60) + parseInt(calibMins);
                if (isNaN(totalMins) || totalMins < 1) return;
                setDailyGoalMinutes(totalMins);
                setInitialGoalMinutes(totalMins);
                setIsGoalSet(true);
                setIsConfirmedForSession(true);
                updateStats(totalSecondsSpent, breakCount, totalMins, totalMins);
            };

            const confirmLockedGoal = () => {
                setIsConfirmedForSession(true);
            };

            const extendQuota = () => {
                const extra = parseInt(extensionMinutes);
                if (isNaN(extra) || extra < 1) return;
                const newGoal = dailyGoalMinutes + extra;
                setDailyGoalMinutes(newGoal);
                updateStats(totalSecondsSpent, breakCount, newGoal, initialGoalMinutes);
                setShowCompletionProtocol(false);
            };

            const addTask = async (e) => {
                e.preventDefault();
                if (!newTask.trim() || !profile.isCreated || !F) return;
                const tasksRef = F.collection(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'tasks');
                await F.addDoc(tasksRef, { text: newTask, completed: false, timeSpent: 0, createdAt: F.serverTimestamp() });
                setNewTask("");
            };

            const toggleTask = async (taskId, currentStatus) => {
                if (!profile.isCreated || !F) return;
                const taskDoc = F.doc(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'tasks', taskId);
                const willBeCompleted = !currentStatus;
                await F.updateDoc(taskDoc, { completed: willBeCompleted });

                if (mode === 'focus' && taskId === activeTaskId && willBeCompleted) {
                    const nextIncomplete = tasks.find(t => t.id !== taskId && !t.completed);
                    if (nextIncomplete) setActiveTaskId(nextIncomplete.id);
                }
            };

            const deleteTask = async (taskId) => {
                if (!profile.isCreated || !F) return;
                const taskDoc = F.doc(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'tasks', taskId);
                await F.deleteDoc(taskDoc);
                if (activeTaskId === taskId) setActiveTaskId(null);
            };

            const updateTaskDuration = async (taskId, totalTime) => {
                if (!profile.isCreated || !F || !taskId) return;
                const taskDoc = F.doc(F.db, 'artifacts', appId, 'user_vault', profile.nickname, 'tasks', taskId);
                await F.updateDoc(taskDoc, { timeSpent: totalTime ?? 0 });
            };

            const startTimer = () => {
                setIsTimerRunning(true);
                timerRef.current = setInterval(() => {
                    if (mode === 'focus') {
                        setSessionSeconds(prev => prev + 1);
                        const currentActiveId = activeTaskIdRef.current;
                        if (currentActiveId) {
                            setTasks(prevTasks => prevTasks.map(t => {
                                if (t.id === currentActiveId) {
                                    const newTime = (t.timeSpent || 0) + 1;
                                    if (newTime % 10 === 0) updateTaskDuration(t.id, newTime);
                                    return { ...t, timeSpent: newTime };
                                }
                                return t;
                            }));
                        }
                        setTotalSecondsSpent(prev => {
                            const next = prev + 1;
                            if (next % 10 === 0) updateStats(next, breakCount); 
                            return next;
                        });
                    } else if (mode === 'break') {
                        setBreakSeconds(prev => prev + 1);
                    }
                }, 1000);
            };

            const stopTimer = () => {
                setIsTimerRunning(false);
                if (timerRef.current) clearInterval(timerRef.current);
                updateStats(totalSecondsSpent, breakCount);
                
                if (activeTaskIdRef.current) {
                    setTasks(currentTasks => {
                        const active = currentTasks.find(t => t.id === activeTaskIdRef.current);
                        if (active) updateTaskDuration(active.id, active.timeSpent || 0);
                        return currentTasks;
                    });
                }

                if (totalSecondsSpent >= dailyGoalMinutes * 60) {
                    setShowCompletionProtocol(true);
                }
            };

            const formatTime = (totalSeconds) => {
                const hrs = Math.floor(totalSeconds / 3600);
                const mins = Math.floor((totalSeconds % 3600) / 60);
                const secs = totalSeconds % 60;
                return `${hrs > 0 ? hrs + ':' : ''}${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const initialGoalSeconds = initialGoalMinutes * 60;
            const primaryProgress = Math.min(100, (totalSecondsSpent / (initialGoalSeconds || 1)) * 100);
            const isExtended = dailyGoalMinutes > initialGoalMinutes;
            const extensionMinutesTotal = dailyGoalMinutes - initialGoalMinutes;
            const spentInExtensionSeconds = Math.max(0, totalSecondsSpent - initialGoalSeconds);
            const secondaryProgress = extensionMinutesTotal > 0 ? Math.min(100, (spentInExtensionSeconds / (extensionMinutesTotal * 60)) * 100) : 0;

            const completedTasksCount = tasks.filter(t => t.completed).length;
            const activeTask = tasks.find(t => t.id === activeTaskId);
            const timeLeft = Math.max(0, (dailyGoalMinutes * 60) - totalSecondsSpent);

            if (authLoading || isLoggingOut) return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-indigo-500 border-t-transparent animate-spin rounded-full" />
                </div>
            );

            if (!profile.isCreated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-white selection:bg-indigo-500">
                        <div className="max-w-md w-full bg-slate-900 border border-slate-800 p-10 md:p-14 text-center space-y-10 shadow-2xl relative overflow-hidden group">
                            <div className="absolute top-0 left-0 w-full h-1 bg-indigo-600 transition-all group-hover:h-2 duration-500"></div>
                            <div className="inline-flex p-5 bg-indigo-600/10 text-indigo-500 rounded-sm"><Icon name="fingerprint" size="3.5rem" /></div>
                            <div className="space-y-3">
                                <h1 className="text-4xl font-black tracking-tighter uppercase italic leading-none">StudyFlow</h1>
                                <div className="flex bg-slate-950 p-1 rounded-sm w-fit mx-auto mt-4 border border-slate-800">
                                    <button onClick={() => { setAuthMode('login'); setLoginError(""); }} className={`px-6 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-sm transition-all ${authMode === 'login' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>Login</button>
                                    <button onClick={() => { setAuthMode('signup'); setLoginError(""); }} className={`px-6 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-sm transition-all ${authMode === 'signup' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>New</button>
                                </div>
                            </div>
                            <form onSubmit={handleAuthSubmit} className="space-y-8 text-left">
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">{authMode === 'login' ? 'Identify Alias' : 'Register New Alias'}</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-700 transition-colors"><Icon name="user" size="1.2rem" /></div>
                                        <input type="text" required value={loginUsername} onChange={(e) => setLoginUsername(e.target.value)} placeholder="Username..." className="w-full py-5 pl-12 pr-6 bg-slate-950 border border-slate-800 focus:border-indigo-500 text-white outline-none transition-all placeholder:text-slate-800 font-bold text-lg" />
                                    </div>
                                    {loginError && <p className="text-red-400 text-[10px] font-bold uppercase tracking-wider ml-1 italic leading-tight">{loginError}</p>}
                                </div>
                                <button type="submit" disabled={isLoggingIn || !loginUsername.trim()} className="w-full py-6 bg-indigo-600 text-white font-black uppercase tracking-[0.3em] hover:bg-indigo-700 transition-all flex items-center justify-center gap-4 disabled:opacity-50 shadow-xl shadow-indigo-600/10 active:scale-[0.98]">
                                    {isLoggingIn ? <div className="w-6 h-6 border-2 border-white border-t-transparent animate-spin rounded-full" /> : <>{authMode === 'login' ? <Icon name="right-to-bracket" /> : <Icon name="user-plus" />}{authMode === 'login' ? 'Establish Link' : 'Register Terminal'}</>}
                                </button>
                            </form>
                            <div className="pt-6 border-t border-slate-800/50">
                                <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest leading-relaxed max-w-[240px] mx-auto">Persistence Enabled.<br />Login to resume sessions.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // NEURAL GOAL CALIBRATION / CONFIRMATION SCREEN
            if (!isConfirmedForSession) {
                const hrs = Math.floor(dailyGoalMinutes / 60);
                const mins = dailyGoalMinutes % 60;
                
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-white selection:bg-indigo-500">
                        <div className="max-w-md w-full bg-slate-900 border-2 border-indigo-500/20 p-10 md:p-14 text-center space-y-10 shadow-2xl rounded-sm">
                            <div className="inline-flex p-5 bg-indigo-600/10 text-indigo-500 rounded-full animate-pulse"><Icon name={isGoalSet ? "shield-check" : "brain"} size="3.5rem" /></div>
                            <div className="space-y-4">
                                <h1 className="text-2xl font-black tracking-tighter uppercase italic leading-none">{isGoalSet ? "Protocol Established" : "Calibration Required"}</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">{isGoalSet ? "Daily objective is locked for the current cycle." : "New cycle detected. Define daily objective duration."}</p>
                            </div>
                            
                            <div className="space-y-8">
                                {isGoalSet ? (
                                    <div className="bg-slate-950/50 border border-white/5 p-8 rounded-lg space-y-4">
                                        <div className="flex justify-center gap-8">
                                            <div className="text-center">
                                                <p className="text-[9px] font-black text-slate-600 uppercase mb-1">Hours</p>
                                                <p className="text-4xl font-mono font-bold text-indigo-500">{hrs}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[9px] font-black text-slate-600 uppercase mb-1">Minutes</p>
                                                <p className="text-4xl font-mono font-bold text-indigo-500">{mins}</p>
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-white/5">
                                            <p className="text-[10px] font-black text-slate-500 uppercase">Target: {dailyGoalMinutes} Minutes</p>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex gap-4">
                                        <div className="flex-1 space-y-2 text-center">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 block">Hours</label>
                                            <input type="number" value={calibHrs} onChange={(e) => setCalibHrs(Math.max(0, parseInt(e.target.value) || 0))} className="w-full py-4 bg-slate-950 border border-slate-800 focus:border-indigo-500 text-white outline-none transition-all font-mono font-bold text-3xl text-center rounded-lg" />
                                        </div>
                                        <div className="flex-1 space-y-2 text-center">
                                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 block">Minutes</label>
                                            <input type="number" value={calibMins} onChange={(e) => setCalibMins(Math.max(0, Math.min(59, parseInt(e.target.value) || 0)))} className="w-full py-4 bg-slate-950 border border-slate-800 focus:border-indigo-500 text-white outline-none transition-all font-mono font-bold text-3xl text-center rounded-lg" />
                                        </div>
                                    </div>
                                )}
                                
                                <button onClick={isGoalSet ? confirmLockedGoal : setDailyInitialGoal} className="w-full py-6 bg-indigo-600 text-white font-black uppercase tracking-[0.3em] hover:bg-indigo-700 transition-all flex items-center justify-center gap-4 shadow-xl active:scale-[0.98]">
                                    {isGoalSet ? "Initialize Interface" : "Confirm Protocol"}
                                </button>
                                
                                <p className="text-[9px] text-slate-700 font-bold uppercase italic tracking-widest leading-relaxed">
                                    {isGoalSet ? "Encryption Active. Goal cannot be edited." : "Note: Initial mission duration cannot be altered once confirmed."}
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!authUser) return null;

            return (
                <div className={`min-h-screen transition-all duration-700 flex overflow-hidden ${mode === 'planning' ? 'bg-slate-50 text-slate-900' : mode === 'focus' ? 'bg-slate-950 text-white' : 'bg-emerald-950 text-white'}`}>
                    
                    <aside className="w-80 border-r border-slate-200/10 bg-black/20 hidden xl:flex flex-col p-6 backdrop-blur-md">
                        <div className="flex items-center justify-between mb-12">
                            <div className="flex items-center gap-3">
                                <div className="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse" />
                                <span className="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-400">Live Network</span>
                            </div>
                            <button onClick={handleSignOut} className="text-slate-600 hover:text-red-400 transition-colors p-2" title="Sign Out"><Icon name="right-from-bracket" /></button>
                        </div>
                        <div className="space-y-4 flex-1 overflow-y-auto pr-2">
                            {networkPresence.length === 0 && <div className="py-12 text-center opacity-20"><p className="text-[10px] font-black uppercase tracking-widest">Scanning Peers...</p></div>}
                            {networkPresence.map(peer => (
                                <div key={peer.id} className="bg-white/5 border border-white/5 p-4 group rounded-lg">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1 h-7 rounded-full transition-all duration-500 ${peer.status === 'Focusing' ? 'bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.5)]' : peer.status === 'Resting' ? 'bg-emerald-500' : 'bg-slate-700'}`} />
                                        <div className="flex-1 min-w-0">
                                            <p className="text-xs font-black text-slate-200 uppercase tracking-tight truncate">{peer.name}</p>
                                            <p className={`text-[9px] font-bold ${peer.status === 'Focusing' ? 'text-indigo-400' : peer.status === 'Resting' ? 'text-emerald-400' : 'text-slate-600'}`}>{peer.status.toUpperCase()}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-y-auto">
                        <div className="max-w-5xl w-full mx-auto px-8 py-16">
                            <header className="mb-14 border-b border-slate-500/10 pb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 text-white sm:text-inherit">
                                <div className="space-y-3">
                                    <div className="flex items-center gap-4">
                                        <h1 className="text-3xl font-black tracking-tighter italic leading-none">STUDYFLOW</h1>
                                        <span className="bg-indigo-600/10 text-indigo-500 text-[11px] font-black px-2.5 py-1 tracking-tighter uppercase rounded">Network Live</span>
                                    </div>
                                    <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em]">{mode === 'planning' ? "Phase: Strategic Entry" : mode === 'focus' ? "Phase: Neural Execution" : "Phase: Cognitive Recharge"}</p>
                                </div>
                                <div className="text-left md:text-right flex flex-col items-start md:items-end gap-4">
                                    <div className="space-y-1.5 text-inherit">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 block">Operator Alias</label>
                                        <div className="flex items-center gap-2 justify-end text-sm font-mono font-bold text-indigo-500"><Icon name="user" size="0.8rem" /> <span>{profile.nickname}</span></div>
                                    </div>
                                    <button onClick={handleSignOut} className={`flex items-center gap-2 px-4 py-2 border border-slate-500/20 text-[10px] font-black uppercase tracking-[0.2em] hover:border-red-500 hover:text-red-500 transition-all ${mode === 'planning' ? 'bg-white text-slate-700 shadow-sm' : 'bg-slate-900 text-white'}`}><Icon name="right-from-bracket" /> Disconnect</button>
                                </div>
                            </header>

                            {mode === 'planning' && (
                                <div className="space-y-12 animate-in">
                                    <section className="bg-white border border-slate-100 rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6 opacity-80">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-slate-100 text-slate-400 rounded-lg"><Icon name="lock" size="1.2rem" /></div>
                                            <div>
                                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-400">Locked Goal</h3>
                                                <p className="text-sm font-bold text-slate-800">DAILY MISSION DURATION</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                            <span className="w-24 bg-transparent text-center font-mono font-bold text-slate-400">{Math.floor(dailyGoalMinutes/60)}h {dailyGoalMinutes%60}m</span>
                                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 pr-2">Quota</span>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <form onSubmit={addTask} className="relative group">
                                            <div className="absolute inset-y-0 left-5 flex items-center text-slate-300 group-focus-within:text-indigo-500"><Icon name="sliders" size="1.2rem" /></div>
                                            <input type="text" value={newTask} onChange={(e) => setNewTask(e.target.value)} placeholder="DEFINE OPERATIONAL OBJECTIVE..." className="w-full py-8 pl-14 pr-20 bg-white border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-300 text-slate-900 font-bold text-base tracking-tight shadow-sm rounded-lg" />
                                            <button type="submit" className="absolute right-5 top-1/2 -translate-y-1/2 p-3 bg-slate-900 text-white hover:bg-black rounded-md"><Icon name="plus" size="1.2rem" /></button>
                                        </form>
                                        <div className="grid grid-cols-1 gap-2">
                                            {tasks.length === 0 && <div className="py-28 text-center border-2 border-dashed border-slate-200 rounded-xl"><p className="text-slate-300 text-[11px] font-black uppercase tracking-[0.5em] opacity-50">Operational Queue Empty</p></div>}
                                            {tasks.map(task => (
                                                <div key={task.id} className="flex items-center gap-5 p-6 bg-white border border-slate-100 hover:border-indigo-200 shadow-sm group rounded-xl transition-all">
                                                    <button onClick={() => toggleTask(task.id, task.completed)} className="text-slate-200 hover:text-indigo-500">{task.completed ? <Icon name="check-square" size="1.6rem" className="text-indigo-500" /> : <Icon name="square" size="1.6rem" />}</button>
                                                    <div className="flex-1">
                                                        <p className={`text-base font-bold tracking-tight ${task.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{task.text}</p>
                                                        <span className="text-[9px] font-bold text-indigo-400/60 uppercase">{formatTime(task.timeSpent || 0)} INVESTED</span>
                                                    </div>
                                                    <button onClick={() => deleteTask(task.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all"><Icon name="trash-alt" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                    <button disabled={tasks.length === 0} onClick={() => { setMode('focus'); setSessionSeconds(0); setShowCompletionProtocol(false); }} className="w-full flex items-center justify-between px-12 py-10 bg-indigo-600 text-white font-black uppercase tracking-[0.4em] hover:bg-indigo-700 shadow-2xl disabled:opacity-50 group rounded-2xl transition-all">Initiate Focus Deployment <Icon name="chevron-right" /></button>
                                </div>
                            )}

                            {(mode === 'focus' || mode === 'break') && !showCompletionProtocol && (
                                <div className="space-y-8 animate-in text-white">
                                    <div className="flex">
                                        <button onClick={() => { stopTimer(); setMode('planning'); }} className="group flex items-center gap-3 px-5 py-3 border border-white/10 hover:border-indigo-500/50 hover:bg-indigo-500/5 transition-all text-[11px] font-black uppercase tracking-[0.2em] rounded-xl"><Icon name="arrow-left" className="group-hover:-translate-x-1" /> Return to Strategic Planning</button>
                                    </div>

                                    <div className={`p-8 border-2 transition-all duration-700 rounded-2xl ${mode === 'focus' ? 'bg-slate-900 border-white/5 shadow-2xl' : 'bg-emerald-900/40 border-emerald-500/20 shadow-2xl'}`}>
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
                                            <div>
                                                <h2 className={`text-[10px] font-black uppercase tracking-[0.2em] mb-2 ${mode === 'focus' ? 'text-indigo-500' : 'text-emerald-500'}`}>Mission Runtime</h2>
                                                <p className="text-5xl font-mono font-bold tracking-tighter tabular-nums leading-none">{formatTime(totalSecondsSpent)}</p>
                                            </div>
                                            <div className="text-left sm:text-right">
                                                <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 mb-2">Target Remaining</h2>
                                                <p className="text-3xl font-mono text-slate-400 tabular-nums leading-none">{formatTime(timeLeft)}</p>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <div className="space-y-1.5">
                                                <div className="flex justify-between items-center text-[9px] font-black uppercase tracking-[0.2em] text-slate-500">
                                                    <span>Mission 1 {primaryProgress >= 100 ? `[COMPLETED: ${initialGoalMinutes}m]` : ''}</span>
                                                    <span>{Math.round(primaryProgress)}%</span>
                                                </div>
                                                <div className="h-2 w-full bg-white/5 overflow-hidden rounded-full border border-white/5">
                                                    <div className="h-full transition-all duration-1000 ease-out bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.5)]" style={{ width: `${primaryProgress}%` }} />
                                                </div>
                                            </div>

                                            {isExtended && (
                                                <div className="space-y-1.5 pt-2 border-t border-white/5 animate-in">
                                                    <div className="flex justify-between items-center text-[9px] font-black uppercase tracking-[0.2em] text-amber-500">
                                                        <span>Mission 2 {secondaryProgress >= 100 ? `[COMPLETED: ${extensionMinutesTotal}m]` : ''}</span>
                                                        <span>{Math.round(secondaryProgress)}%</span>
                                                    </div>
                                                    <div className="h-1.5 w-full bg-white/5 overflow-hidden rounded-full border border-amber-900/20">
                                                        <div className="h-full transition-all duration-1000 ease-out bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.3)]" style={{ width: `${secondaryProgress}%` }} />
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex flex-col lg:flex-row gap-10 items-start">
                                        <div className="w-full lg:w-72 flex flex-col gap-5 bg-white/5 p-6 rounded-2xl border border-white/5">
                                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex justify-between px-1 border-b border-white/5 pb-3">Objective Stack <span>{completedTasksCount}/{tasks.length}</span></h3>
                                            <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                                {tasks.map(task => (
                                                    <div key={task.id} className={`w-full flex items-center gap-3 p-4 border transition-all rounded-xl cursor-pointer ${activeTaskId === task.id ? 'bg-indigo-600/10 border-indigo-500/30 text-white shadow-lg' : 'bg-white/5 border-white/5 text-slate-400 hover:border-white/10'}`} onClick={() => setActiveTaskId(task.id)}>
                                                        <button onClick={(e) => { e.stopPropagation(); toggleTask(task.id, task.completed); }} className={`transition-colors hover:text-indigo-400 ${task.completed ? 'text-indigo-500' : 'text-slate-700'}`}>
                                                            {task.completed ? <Icon name="check-square" size="1.2rem" /> : <Icon name="square" size="1.2rem" />}
                                                        </button>
                                                        <div className="flex-1 overflow-hidden">
                                                            <span className={`text-[10px] font-bold truncate block uppercase ${task.completed ? 'opacity-30 line-through' : ''}`}>{task.text}</span>
                                                            <span className={`text-[8px] font-bold tracking-widest ${activeTaskId === task.id ? 'text-indigo-400' : 'text-slate-700'}`}>{formatTime(task.timeSpent || 0)}</span>
                                                        </div>
                                                        {activeTaskId === task.id && <div className="w-1 h-3 rounded-full bg-indigo-400 animate-pulse" />}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className={`flex-1 w-full p-12 border-2 flex flex-col items-center justify-center transition-all duration-700 rounded-3xl ${mode === 'focus' ? 'bg-slate-900 border-white/10 shadow-indigo-500/5' : 'bg-emerald-900 border-emerald-500/20'}`}>
                                            <div className="mb-8 text-center space-y-2">
                                                <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">{mode === 'focus' ? 'Primary Directive' : 'Recovery Phase'}</h3>
                                                <p className="text-lg font-black text-indigo-400 uppercase tracking-wider truncate max-w-full px-4">{mode === 'focus' ? (activeTask ? activeTask.text : "AWAITING TARGET") : "REPLENISHING NEURAL CAPACITY"}</p>
                                                {mode === 'focus' && activeTask && <p className="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Time Invested: {formatTime(activeTask.timeSpent || 0)}</p>}
                                            </div>
                                            <div className={`text-7xl sm:text-8xl font-mono font-bold mb-12 tracking-tighter tabular-nums ${mode === 'focus' ? 'text-white' : 'text-emerald-100'}`}>{formatTime(mode === 'focus' ? sessionSeconds : breakSeconds)}</div>
                                            <div className="flex gap-4 w-full max-w-[400px]">
                                                <button onClick={isTimerRunning ? stopTimer : startTimer} className={`flex-1 py-6 font-black uppercase tracking-[0.2em] border-2 transition-all text-xs rounded-2xl ${isTimerRunning ? 'border-red-500 text-red-500 hover:bg-red-500 hover:text-white' : mode === 'focus' ? 'bg-indigo-600 text-white border-indigo-600 shadow-xl' : 'bg-emerald-600 text-white border-emerald-600'}`}>{isTimerRunning ? 'Pause' : 'Resume'}</button>
                                                <button onClick={() => { stopTimer(); if (mode === 'focus') { setMode('break'); setSessionSeconds(0); } else { setMode('focus'); setBreakSeconds(0); setBreakCount(prev => prev + 1); } }} className="px-10 border-2 border-white/10 text-white/40 hover:text-white transition-all flex items-center justify-center rounded-2xl">{mode === 'focus' ? <Icon name="mug-hot" size="1.2rem" /> : <Icon name="bolt" size="1.2rem" />}</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {showCompletionProtocol && (
                                <div className="animate-in text-white space-y-10">
                                    <div className="bg-slate-900 border-2 border-emerald-500/40 p-16 text-center space-y-12 shadow-2xl rounded-3xl">
                                        <div className="inline-flex p-6 bg-emerald-500/10 text-emerald-400 mb-6 rounded-2xl border border-emerald-500/20"><Icon name="trophy" size="4rem" /></div>
                                        <h2 className="text-5xl font-black tracking-tighter text-white uppercase italic leading-none">Quota Achieved</h2>
                                        <div className="grid grid-cols-3 gap-1 py-10 border-y border-white/5 font-mono">
                                            <div><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Final Runtime</p><p className="text-emerald-400 text-2xl font-bold">{formatTime(totalSecondsSpent)}</p></div>
                                            <div className="border-x border-white/5"><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Objectives</p><p className="text-indigo-400 text-2xl font-bold">{completedTasksCount}/{tasks.length}</p></div>
                                            <div><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Recovery</p><p className="text-emerald-400 text-2xl font-bold">{breakCount}</p></div>
                                        </div>
                                        <div className="flex flex-col md:flex-row gap-6 items-stretch">
                                            <button onClick={handleSignOut} className="flex-1 flex items-center justify-center gap-3 px-8 py-6 bg-slate-800 text-slate-300 font-black uppercase tracking-[0.3em] hover:bg-red-900/40 hover:text-red-400 rounded-2xl border border-white/5">Secure System</button>
                                            <div className="flex-1 flex flex-col gap-4 p-6 bg-indigo-600/5 rounded-2xl border border-indigo-500/20">
                                                <div className="flex items-center justify-between gap-4">
                                                    <div className="flex flex-col text-left">
                                                        <label className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">Extension Duration</label>
                                                        <div className="flex items-center gap-2 bg-slate-950 p-2 rounded border border-white/5">
                                                            <input type="number" value={extensionMinutes} onChange={(e) => setExtensionMinutes(parseInt(e.target.value) || 0)} className="w-16 bg-transparent font-mono font-bold text-white outline-none" min="1" />
                                                            <span className="text-[9px] font-black uppercase text-slate-500">Mins</span>
                                                        </div>
                                                    </div>
                                                    <button onClick={extendQuota} className="flex-1 py-4 bg-indigo-600 text-white font-black uppercase tracking-[0.2em] hover:bg-indigo-700 rounded-xl">Extend Mission</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
