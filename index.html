<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow | Neural Focus Terminal</title>
    
    <!-- Scripts for Browser-side React & Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc, getDocs, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // --- GITHUB PAGES CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCkZiwteYCvWjq9PJ6CCyBJC2lXyCfFYqk",
            authDomain: "studyflow-a9bb7.firebaseapp.com",
            projectId: "studyflow-a9bb7",
            storageBucket: "studyflow-a9bb7.firebasestorage.app",
            messagingSenderId: "507408677066",
            appId: "1:507408677066:web:b5ef1dbd02b1d3c6b45c33"
        };

        // Check if user actually replaced the keys (Safe check)
        const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

        let app, auth, db;
        if (isConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // Expose to window so React can access them
        window.FirebaseAPI = { 
            isConfigured, 
            auth, db, 
            signInAnonymously, onAuthStateChanged, signOut, updateProfile, 
            doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc, getDocs, serverTimestamp 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.15); border-radius: 0px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.3); }

        .animate-in { animation: fadeIn 0.7s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "", size = "1em", style = {} }) => (
            <i className={`fas fa-${name} ${className}`} style={{ fontSize: size, ...style }}></i>
        );

        const App = () => {
            const F = window.FirebaseAPI;
            const appId = "study-flow-v5";

            // --- Auth & Profile State ---
            const [authUser, setAuthUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [isLoggingOut, setIsLoggingOut] = useState(false);
            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('sf_profile_v5');
                return saved ? JSON.parse(saved) : { nickname: '', id: '', isCreated: false };
            });

            const [authMode, setAuthMode] = useState('login'); 
            const [loginUsername, setLoginUsername] = useState("");
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [loginError, setLoginError] = useState("");

            // --- App State ---
            const [tasks, setTasks] = useState([]);
            const [activeTaskId, setActiveTaskId] = useState(null);
            const [newTask, setNewTask] = useState("");
            const [mode, setMode] = useState('planning'); 
            const [dailyGoalMinutes, setDailyGoalMinutes] = useState(120); 
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [sessionSeconds, setSessionSeconds] = useState(0);
            const [totalSecondsSpent, setTotalSecondsSpent] = useState(0);
            const [breakSeconds, setBreakSeconds] = useState(0);
            const [breakCount, setBreakCount] = useState(0);
            const [networkPresence, setNetworkPresence] = useState([]);
            const timerRef = useRef(null);

            // --- Step 1: Managed Authentication Lifecycle ---
            useEffect(() => {
                if (!F || !F.isConfigured) {
                    setAuthLoading(false);
                    return;
                }
                const unsubscribe = F.onAuthStateChanged(F.auth, (user) => {
                    setAuthUser(user);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, [F]);

            // --- Step 2: Data & Presence Sync ---
            useEffect(() => {
                if (!authUser || !profile.isCreated || isLoggingOut || !F || !F.isConfigured) return;

                const tasksRef = F.collection(F.db, 'artifacts', appId, 'users', authUser.uid, 'tasks');
                const unsubTasks = F.onSnapshot(tasksRef, (snapshot) => {
                    const taskList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setTasks(taskList.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Firestore error:", err));

                const statsRef = F.doc(F.db, 'artifacts', appId, 'users', authUser.uid, 'stats', 'daily');
                const unsubStats = F.onSnapshot(statsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setTotalSecondsSpent(data.totalSecondsSpent || 0);
                        setDailyGoalMinutes(data.dailyGoalMinutes || 120);
                        setBreakCount(data.breakCount || 0);
                    }
                });

                const presenceRef = F.collection(F.db, 'artifacts', appId, 'public', 'data', 'presence');
                const unsubPresence = F.onSnapshot(presenceRef, (snapshot) => {
                    const others = snapshot.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .filter(p => p.id !== authUser.uid);
                    setNetworkPresence(others);
                });

                return () => { unsubTasks(); unsubStats(); unsubPresence(); };
            }, [authUser, profile.isCreated, isLoggingOut]);

            // --- Step 3: Presence Heartbeat ---
            useEffect(() => {
                if (!authUser || !profile.isCreated || isLoggingOut || !F || !F.isConfigured) return;
                const updatePresence = async () => {
                    try {
                        const myPresenceRef = F.doc(F.db, 'artifacts', appId, 'public', 'data', 'presence', authUser.uid);
                        await F.setDoc(myPresenceRef, {
                            name: profile.nickname,
                            status: mode === 'focus' ? 'Focusing' : mode === 'break' ? 'Resting' : 'Planning',
                            lastSeen: F.serverTimestamp()
                        }, { merge: true });
                    } catch (e) {
                        console.warn("Presence update skipped.");
                    }
                };
                updatePresence();
                const interval = setInterval(updatePresence, 30000); 
                return () => clearInterval(interval);
            }, [authUser, profile.isCreated, mode, isLoggingOut]);

            // --- Auth Handlers ---
            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                const val = loginUsername.trim();
                
                if (!F || !F.isConfigured) {
                    setLoginError("Error: Firebase Keys not configured correctly.");
                    return;
                }

                setIsLoggingIn(true);
                setLoginError("");

                try {
                    // 1. Initial Auth
                    let currentFirebaseUser = F.auth.currentUser;
                    if (!currentFirebaseUser) {
                        const result = await F.signInAnonymously(F.auth);
                        currentFirebaseUser = result.user;
                    }

                    // 2. Permanent Profile Check
                    const profilesRef = F.collection(F.db, 'artifacts', appId, 'public', 'data', 'profiles');
                    const snap = await F.getDocs(profilesRef);
                    const existingProfile = snap.docs.find(d => d.data().nickname?.toLowerCase() === val.toLowerCase());

                    if (authMode === 'signup') {
                        if (existingProfile) {
                            setLoginError("This alias is already claimed.");
                            setIsLoggingIn(false); return;
                        }
                        await F.setDoc(F.doc(F.db, 'artifacts', appId, 'public', 'data', 'profiles', currentFirebaseUser.uid), {
                            nickname: val, createdAt: F.serverTimestamp()
                        });
                    } else if (!existingProfile) {
                        setLoginError("Identity not found. Try 'New'.");
                        setIsLoggingIn(false); return;
                    }

                    // 3. Link Name
                    await F.updateProfile(currentFirebaseUser, { displayName: val });
                    const newProfile = { nickname: val, id: currentFirebaseUser.uid, isCreated: true };
                    localStorage.setItem('sf_profile_v5', JSON.stringify(newProfile));
                    setProfile(newProfile);
                    
                } catch (err) {
                    console.error(err);
                    if (err.code === 'permission-denied') {
                        setLoginError("Database access denied. Set Firestore to Test Mode.");
                    } else {
                        setLoginError(`Link Failure: ${err.message || 'Check connection'}`);
                    }
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleSignOut = async () => {
                if (!F || !F.isConfigured) return;
                stopTimer();
                setIsLoggingOut(true); 
                try {
                    if (authUser) {
                        const myPresenceRef = F.doc(F.db, 'artifacts', appId, 'public', 'data', 'presence', authUser.uid);
                        await F.deleteDoc(myPresenceRef).catch(() => {});
                    }
                    await F.signOut(F.auth);
                    localStorage.removeItem('sf_profile_v5');
                    setProfile({ nickname: '', id: '', isCreated: false });
                    setAuthUser(null);
                    window.location.reload();
                } catch (err) {
                    console.error(err);
                    setIsLoggingOut(false);
                }
            };

            // --- Handlers ---
            const addTask = async (e) => {
                e.preventDefault();
                if (!newTask.trim() || !authUser || !F || !F.isConfigured) return;
                const tasksRef = F.collection(F.db, 'artifacts', appId, 'users', authUser.uid, 'tasks');
                await F.addDoc(tasksRef, { text: newTask, completed: false, createdAt: F.serverTimestamp() });
                setNewTask("");
            };

            const toggleTask = async (taskId, currentStatus) => {
                if (!authUser || !F || !F.isConfigured) return;
                const taskDoc = F.doc(F.db, 'artifacts', appId, 'users', authUser.uid, 'tasks', taskId);
                await F.updateDoc(taskDoc, { completed: !currentStatus });
            };

            const deleteTask = async (taskId) => {
                if (!authUser || !F || !F.isConfigured) return;
                const taskDoc = F.doc(F.db, 'artifacts', appId, 'users', authUser.uid, 'tasks', taskId);
                await F.deleteDoc(taskDoc);
                if (activeTaskId === taskId) setActiveTaskId(null);
            };

            const updateStats = async (seconds, breaks) => {
                if (!authUser || !F || !F.isConfigured) return;
                const statsRef = F.doc(F.db, 'artifacts', appId, 'users', authUser.uid, 'stats', 'daily');
                await F.setDoc(statsRef, {
                    totalSecondsSpent: seconds,
                    breakCount: breaks,
                    dailyGoalMinutes,
                    updatedAt: F.serverTimestamp()
                }, { merge: true });
            };

            const startTimer = () => {
                if (totalSecondsSpent >= dailyGoalMinutes * 60) return;
                setIsTimerRunning(true);
                timerRef.current = setInterval(() => {
                    if (mode === 'focus') {
                        setSessionSeconds(prev => prev + 1);
                        setTotalSecondsSpent(prev => {
                            const next = prev + 1;
                            if (next % 15 === 0) updateStats(next, breakCount); 
                            return next;
                        });
                    } else if (mode === 'break') {
                        setBreakSeconds(prev => prev + 1);
                    }
                }, 1000);
            };

            const stopTimer = () => {
                setIsTimerRunning(false);
                if (timerRef.current) clearInterval(timerRef.current);
                updateStats(totalSecondsSpent, breakCount);
            };

            const formatTime = (totalSeconds) => {
                const hrs = Math.floor(totalSeconds / 3600);
                const mins = Math.floor((totalSeconds % 3600) / 60);
                const secs = totalSeconds % 60;
                return `${hrs > 0 ? hrs + ':' : ''}${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const timeProgressPercent = Math.min(100, (totalSecondsSpent / (dailyGoalMinutes * 60)) * 100);
            const completedTasksCount = tasks.filter(t => t.completed).length;
            const taskProgressPercent = tasks.length > 0 ? (completedTasksCount / tasks.length) * 100 : 0;
            const activeTask = tasks.find(t => t.id === activeTaskId);
            const timeLeft = Math.max(0, (dailyGoalMinutes * 60) - totalSecondsSpent);

            if (authLoading || isLoggingOut) return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                    <div className="w-10 h-10 border-2 border-indigo-500 border-t-transparent animate-spin rounded-full" />
                </div>
            );

            // --- UI: Security Terminal (Login/Signup) ---
            if (!profile.isCreated) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-white selection:bg-indigo-500">
                        <div className="max-w-md w-full bg-slate-900 border border-slate-800 p-10 md:p-14 text-center space-y-10 shadow-2xl relative overflow-hidden group">
                            <div className="absolute top-0 left-0 w-full h-1 bg-indigo-600 transition-all group-hover:h-2 duration-500"></div>
                            <div className="inline-flex p-5 bg-indigo-600/10 text-indigo-500 rounded-sm">
                                <Icon name="fingerprint" size="3.5rem" />
                            </div>
                            <div className="space-y-3">
                                <h1 className="text-4xl font-black tracking-tighter uppercase italic leading-none">StudyFlow</h1>
                                <div className="flex bg-slate-950 p-1 rounded-sm w-fit mx-auto mt-4 border border-slate-800">
                                    <button onClick={() => { setAuthMode('login'); setLoginError(""); }} className={`px-6 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-sm transition-all ${authMode === 'login' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>Login</button>
                                    <button onClick={() => { setAuthMode('signup'); setLoginError(""); }} className={`px-6 py-1.5 text-[10px] font-black uppercase tracking-widest rounded-sm transition-all ${authMode === 'signup' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>New</button>
                                </div>
                            </div>

                            <form onSubmit={handleAuthSubmit} className="space-y-8 text-left">
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">{authMode === 'login' ? 'Operator Alias' : 'Register Identifier'}</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-slate-700 transition-colors"><Icon name="user" size="1.2rem" /></div>
                                        <input type="text" required value={loginUsername} onChange={(e) => setLoginUsername(e.target.value)} placeholder="Enter Username..." className="w-full py-5 pl-12 pr-6 bg-slate-950 border border-slate-800 focus:border-indigo-500 text-white outline-none transition-all placeholder:text-slate-800 font-bold text-lg" />
                                    </div>
                                    {loginError && <p className="text-red-400 text-[10px] font-bold uppercase tracking-wider ml-1 italic leading-tight">{loginError}</p>}
                                </div>
                                <button type="submit" disabled={isLoggingIn || !loginUsername.trim()} className="w-full py-6 bg-indigo-600 text-white font-black uppercase tracking-[0.3em] hover:bg-indigo-700 transition-all flex items-center justify-center gap-4 disabled:opacity-50 shadow-xl shadow-indigo-600/10 active:scale-[0.98]">
                                    {isLoggingIn ? <div className="w-6 h-6 border-2 border-white border-t-transparent animate-spin rounded-full" /> : <>{authMode === 'login' ? <Icon name="right-to-bracket" /> : <Icon name="user-plus" />}{authMode === 'login' ? 'Establish Link' : 'Register Terminal'}</>}
                                </button>
                            </form>
                            <div className="pt-6 border-t border-slate-800/50">
                                <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest leading-relaxed max-w-[240px] mx-auto">Cloud sync enabled.<br />Secure profile storage active.</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Dashboard Render Logic ---
            if (!authUser) return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center gap-4">
                    <div className="w-10 h-10 border-2 border-indigo-500 border-t-transparent animate-spin rounded-full" />
                    <p className="text-slate-500 font-black uppercase text-[10px] tracking-widest">Restoring Neural Link...</p>
                </div>
            );

            return (
                <div className={`min-h-screen transition-all duration-700 flex overflow-hidden ${mode === 'planning' ? 'bg-slate-50 text-slate-900' : mode === 'focus' ? 'bg-slate-950 text-white' : 'bg-emerald-950 text-white'}`}>
                    
                    <aside className="w-80 border-r border-slate-200/10 bg-black/20 hidden xl:flex flex-col p-6 backdrop-blur-md">
                        <div className="flex items-center justify-between mb-12">
                            <div className="flex items-center gap-3">
                                <div className="w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse" />
                                <span className="text-[11px] font-black uppercase tracking-[0.2em] text-indigo-400">Live Network</span>
                            </div>
                            <button onClick={handleSignOut} className="text-slate-600 hover:text-red-400 transition-colors p-2" title="Sign Out"><Icon name="right-from-bracket" /></button>
                        </div>
                        <div className="space-y-4 flex-1 overflow-y-auto pr-2">
                            {networkPresence.length === 0 && <div className="py-12 text-center opacity-20"><p className="text-[10px] font-black uppercase tracking-widest">Scanning Peers...</p></div>}
                            {networkPresence.map(peer => (
                                <div key={peer.id} className="bg-white/5 border border-white/5 p-4 group">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-1 h-7 rounded-full transition-all duration-500 ${peer.status === 'Focusing' ? 'bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.5)]' : peer.status === 'Resting' ? 'bg-emerald-500' : 'bg-slate-700'}`} />
                                        <div className="flex-1 min-w-0">
                                            <p className="text-xs font-black text-slate-200 uppercase tracking-tight truncate">{peer.name}</p>
                                            <p className={`text-[9px] font-bold ${peer.status === 'Focusing' ? 'text-indigo-400' : peer.status === 'Resting' ? 'text-emerald-400' : 'text-slate-600'}`}>{peer.status.toUpperCase()}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-full overflow-y-auto">
                        <div className="max-w-4xl w-full mx-auto px-8 py-16">
                            <header className="mb-14 border-b border-slate-500/10 pb-10 flex flex-col md:flex-row justify-between items-start md:items-end gap-6 text-white sm:text-inherit">
                                <div className="space-y-3">
                                    <div className="flex items-center gap-4">
                                        <h1 className="text-3xl font-black tracking-tighter italic leading-none">STUDYFLOW</h1>
                                        <span className="bg-indigo-600/10 text-indigo-500 text-[11px] font-black px-2.5 py-1 tracking-tighter uppercase">Operational</span>
                                    </div>
                                    <p className="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em]">{mode === 'planning' ? "Phase: Strategic Entry" : mode === 'focus' ? "Phase: Neural Execution" : "Phase: Cognitive Recharge"}</p>
                                </div>
                                <div className="text-left md:text-right flex flex-col items-start md:items-end gap-4">
                                    <div className="space-y-1.5 text-inherit">
                                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 block">Operator Alias</label>
                                        <div className="flex items-center gap-2 justify-end text-sm font-mono font-bold text-indigo-500"><Icon name="user" size="0.8rem" /> <span>{profile.nickname}</span></div>
                                    </div>
                                    <button onClick={handleSignOut} className={`flex items-center gap-2 px-4 py-2 border border-slate-500/20 text-[10px] font-black uppercase tracking-[0.2em] hover:border-red-500 hover:text-red-500 transition-all ${mode === 'planning' ? 'bg-white text-slate-700' : 'bg-slate-900 text-white'}`}><Icon name="right-from-bracket" /> Disconnect</button>
                                </div>
                            </header>

                            {mode === 'planning' && (
                                <div className="space-y-12 animate-in">
                                    <section className="space-y-6">
                                        <form onSubmit={addTask} className="relative group">
                                            <div className="absolute inset-y-0 left-5 flex items-center text-slate-300 group-focus-within:text-indigo-500"><Icon name="sliders" size="1.2rem" /></div>
                                            <input type="text" value={newTask} onChange={(e) => setNewTask(e.target.value)} placeholder="DEFINE OPERATIONAL OBJECTIVE..." className="w-full py-8 pl-14 pr-20 bg-white border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-300 text-slate-900 font-bold text-base tracking-tight shadow-sm" />
                                            <button type="submit" className="absolute right-5 top-1/2 -translate-y-1/2 p-3 bg-slate-900 text-white hover:bg-black transition-all active:scale-95"><Icon name="plus" size="1.2rem" /></button>
                                        </form>
                                        <div className="grid grid-cols-1 gap-1.5">
                                            {tasks.length === 0 && <div className="py-28 text-center border-2 border-dashed border-slate-100"><p className="text-slate-300 text-[11px] font-black uppercase tracking-[0.5em] opacity-50">Operational Queue Empty</p></div>}
                                            {tasks.map(task => (
                                                <div key={task.id} className="flex items-center gap-5 p-6 bg-white border border-slate-100 hover:border-indigo-200 shadow-sm group">
                                                    <button onClick={() => toggleTask(task.id, task.completed)} className="text-slate-200 hover:text-indigo-500 transition-colors">{task.completed ? <Icon name="square-check" size="1.6rem" className="text-indigo-500" /> : <Icon name="square" size="1.6rem" />}</button>
                                                    <span className={`flex-1 text-base font-bold tracking-tight ${task.completed ? 'line-through text-slate-300' : 'text-slate-700'}`}>{task.text}</span>
                                                    <button onClick={() => deleteTask(task.id)} className="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 transition-all"><Icon name="trash-can" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                    <button disabled={tasks.length === 0} onClick={() => { setMode('focus'); stopTimer(); }} className="w-full flex items-center justify-between px-12 py-10 bg-indigo-600 text-white font-black uppercase tracking-[0.4em] hover:bg-indigo-700 shadow-2xl disabled:opacity-50 group">Initiate Focus Deployment <Icon name="chevron-right" /></button>
                                </div>
                            )}

                            {(mode === 'focus' || mode === 'break') && totalSecondsSpent < (dailyGoalMinutes * 60) && (
                                <div className="space-y-10 animate-in text-white">
                                    <div className={`p-12 border-2 transition-all duration-700 ${mode === 'focus' ? 'bg-slate-900 border-white/5 shadow-2xl shadow-indigo-500/5' : 'bg-emerald-900/40 border-emerald-500/20 shadow-2xl shadow-emerald-500/5'}`}>
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-10 gap-6">
                                            <div>
                                                <h2 className={`text-[11px] font-black uppercase tracking-[0.2em] mb-4 ${mode === 'focus' ? 'text-indigo-500' : 'text-emerald-500'}`}>Mission Runtime</h2>
                                                <p className="text-6xl font-mono font-bold tracking-tighter tabular-nums leading-none">{formatTime(totalSecondsSpent)}</p>
                                            </div>
                                            <div className="text-left sm:text-right">
                                                <h2 className="text-[11px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4">Quota Deficit</h2>
                                                <p className="text-3xl font-mono text-slate-400 tabular-nums leading-none">{formatTime(timeLeft)}</p>
                                            </div>
                                        </div>
                                        <div className="h-2 w-full bg-white/5 overflow-hidden"><div className={`h-full transition-all duration-1000 ease-out ${mode === 'focus' ? 'bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.5)]' : 'bg-emerald-500'}`} style={{ width: `${timeProgressPercent}%` }} /></div>
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 items-stretch">
                                        <div className="lg:col-span-4 flex gap-5 min-h-[350px]">
                                            <div className="w-2.5 bg-white/5 flex flex-col-reverse overflow-hidden relative border border-white/5"><div className={`w-full transition-all duration-700 ease-in-out ${mode === 'focus' ? 'bg-indigo-500' : 'bg-emerald-500'}`} style={{ height: `${taskProgressPercent}%` }} /></div>
                                            <div className="flex-1 space-y-5">
                                                <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-widest flex justify-between">Objective Stack <span>{completedTasksCount}/{tasks.length}</span></h3>
                                                <div className="space-y-1.5 max-h-[450px] overflow-y-auto pr-3">
                                                    {tasks.map(task => (
                                                        <button key={task.id} onClick={() => setActiveTaskId(task.id)} className={`w-full flex items-center gap-4 p-5 text-left border-2 transition-all ${activeTaskId === task.id ? 'bg-indigo-600/10 border-indigo-500/40 text-white' : 'bg-white/5 border-white/5 text-slate-600 hover:border-white/10'}`}>
                                                            <div className={`w-1 h-4 ${activeTaskId === task.id ? 'bg-indigo-400 animate-pulse' : 'bg-slate-800'}`} />
                                                            <span className={`text-[11px] font-bold truncate tracking-tight uppercase ${task.completed ? 'opacity-30 line-through' : ''}`}>{task.text}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className={`lg:col-span-8 p-14 border-2 flex flex-col items-center justify-center transition-all duration-700 ${mode === 'focus' ? 'bg-slate-900 border-white/10' : 'bg-emerald-900 border-emerald-500/20'}`}>
                                            <div className="mb-8 text-center space-y-2">
                                                <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-[0.2em]">{mode === 'focus' ? 'Primary Directive' : 'Recovery Phase'}</h3>
                                                <p className="text-base font-black text-indigo-400 uppercase tracking-wider truncate max-w-[300px]">{mode === 'focus' ? (activeTask ? activeTask.text : "AWAITING TARGET") : "REPLENISHING NEURAL CAPACITY"}</p>
                                            </div>
                                            <div className={`text-8xl font-mono font-bold mb-14 tracking-tighter tabular-nums ${mode === 'focus' ? 'text-white' : 'text-emerald-100'}`}>{formatTime(mode === 'focus' ? sessionSeconds : breakSeconds)}</div>
                                            <div className="flex gap-4 w-full max-w-[400px]">
                                                <button onClick={isTimerRunning ? stopTimer : startTimer} className={`flex-1 py-6 font-black uppercase tracking-[0.3em] border-2 transition-all text-xs ${isTimerRunning ? 'border-red-500 text-red-500 hover:bg-red-500' : mode === 'focus' ? 'bg-indigo-600 text-white' : 'bg-emerald-600 text-white'}`}>{isTimerRunning ? 'Pause' : 'Resume'}</button>
                                                <button onClick={() => { stopTimer(); if (mode === 'focus') { setMode('break'); setSessionSeconds(0); } else { setMode('focus'); setBreakSeconds(0); setBreakCount(prev => prev + 1); } }} className="px-10 border-2 border-white/10 text-white/40 hover:text-white transition-all flex items-center justify-center">{mode === 'focus' ? <Icon name="mug-hot" /> : <Icon name="bolt" />}</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {totalSecondsSpent >= (dailyGoalMinutes * 60) && (
                                <div className="animate-in text-white">
                                    <div className="bg-slate-900 border-2 border-emerald-500/40 p-16 text-center space-y-12 shadow-2xl">
                                        <div className="inline-flex p-6 bg-emerald-500/10 text-emerald-400 mb-6 rounded-sm border border-emerald-500/20"><Icon name="trophy" size="4rem" /></div>
                                        <h2 className="text-5xl font-black tracking-tighter text-white uppercase italic leading-none">Quota Achieved</h2>
                                        <div className="grid grid-cols-3 gap-1 py-10 border-y border-white/5 font-mono">
                                            <div><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Final Runtime</p><p className="text-emerald-400 text-2xl font-bold">{dailyGoalMinutes}m</p></div>
                                            <div className="border-x border-white/5"><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Objectives</p><p className="text-indigo-400 text-2xl font-bold">{completedTasksCount}/{tasks.length}</p></div>
                                            <div><p className="text-[11px] text-slate-500 mb-2 font-black uppercase">Recovery</p><p className="text-emerald-400 text-2xl font-bold">{breakCount}</p></div>
                                        </div>
                                        <button onClick={handleSignOut} className="flex items-center gap-3 mx-auto px-14 py-6 bg-emerald-600 text-white font-black uppercase tracking-[0.4em] hover:bg-emerald-700 transition-all shadow-2xl active:scale-95"><Icon name="moon" /> Secure System</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
